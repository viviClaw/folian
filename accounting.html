<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>芙莉莲记账 - Frieren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>/**
 * Frieren 共享全局样式系统
 * 所有子项目统一引用此样式，实现一体化视觉效果
 */

/* ========== CSS 变量 ========== */
:root {
  /* 主题色 */
  --primary: #9B7EBD;
  --primary-light: #B794F6;
  --primary-dark: #7c5ce0;
  --accent: #e056fd;
  --accent-cyan: #00d9ff;
  
  /* 背景 */
  --bg-dark: #0a0a0f;
  --bg-card: #1a1a24;
  --bg-card-hover: #2a2a3a;
  --bg-gradient: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg-dark) 70%);
  
  /* 文字 */
  --text-primary: #fff;
  --text-secondary: #aaa;
  --text-muted: #666;
  
  /* 边框 */
  --border-color: #2a2a3a;
  --border-glow: rgba(155, 126, 189, 0.3);
  
  /* 阴影 */
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 40px rgba(155, 126, 189, 0.15);
  
  /* 圆角 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  
  /* 字体 */
  --font-family: 'Outfit', -apple-system, 'Noto Sans SC', sans-serif;
}

/* ========== 全局重置 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-family);
  background: var(--bg-dark);
  background-image: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover {
  color: var(--primary-light);
}

/* ========== 布局容器 ========== */
.frieren-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

/* ========== 导航栏 ========== */
.frieren-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  /* background: var(--bg-card); */
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
  /* border: 1px solid var(--border-color); */
}

.frieren-nav .brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.frieren-nav .brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(155, 126, 189, 0.3);
}

.frieren-nav .brand-name {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-nav .nav-links {
  display: flex;
  gap: 8px;
}

.frieren-nav .nav-link {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

.frieren-nav .nav-link:hover,
.frieren-nav .nav-link.active {
  background: rgba(155, 126, 189, 0.15);
  color: var(--primary);
}

/* ========== 面包屑 ========== */
.frieren-breadcrumb {
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 12px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  border: 1px solid var(--border-color);
}

.frieren-breadcrumb a {
  color: var(--primary);
}

.frieren-breadcrumb a:hover {
  color: var(--accent);
}

.frieren-breadcrumb .current {
  color: var(--text-primary);
}

/* ========== 页面标题 ========== */
.frieren-header {
  text-align: center;
  margin-bottom: 30px;
}

.frieren-header h1 {
  font-size: 2.2rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.frieren-header .subtitle {
  color: var(--text-muted);
  font-size: 1rem;
}

/* ========== 卡片 ========== */
.frieren-card {
  background: linear-gradient(145deg, #1e1e2a, #16161f);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-color);
  transition: all 0.3s ease;
}

.frieren-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-glow);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

/* ========== 按钮 ========== */
.frieren-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
  text-decoration: none;
}

.frieren-btn-primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(155, 126, 189, 0.3);
}

.frieren-btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(155, 126, 189, 0.4);
}

.frieren-btn-secondary {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.frieren-btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* ========== 标签 ========== */
.frieren-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  background: rgba(155, 126, 189, 0.2);
  color: var(--primary);
  border: 1px solid rgba(155, 126, 189, 0.3);
}

.frieren-tag-new {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
}

/* ========== 统计卡片 ========== */
.frieren-stat {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-stat:hover {
  background: var(--bg-card-hover);
}

.frieren-stat .value {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-stat .label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ========== 列表 ========== */
.frieren-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.frieren-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-list-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
}

/* ========== 表格 ========== */
.frieren-table {
  width: 100%;
  border-collapse: collapse;
}

.frieren-table th,
.frieren-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.frieren-table th {
  background: linear-gradient(90deg, rgba(155, 126, 189, 0.1), transparent);
  color: var(--primary);
  font-weight: 600;
}

.frieren-table tr:hover td {
  background: rgba(255, 255, 255, 0.02);
}

/* ========== 底部 ========== */
.frieren-footer {
  text-align: center;
  padding: 30px;
  margin-top: 40px;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--border-color);
}

.frieren-footer .made-with {
  margin-top: 8px;
  font-size: 0.8rem;
}

/* ========== 工具类 ========== */
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-2 { gap: 8px; }
.gap-4 { gap: 16px; }
.grid { display: grid; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .frieren-nav {
    flex-direction: column;
    gap: 12px;
  }
  
  .frieren-nav .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .frieren-header h1 {
    font-size: 1.8rem;
  }
  
  .grid-4 {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  .frieren-container {
    padding: 12px;
  }
  
  .grid-2,
  .grid-4 {
    grid-template-columns: 1fr;
  }
}

/* ========== 减少动画 (可访问性) ========== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* ========== 记账页面样式 ========== */
.accounting-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.accounting-header .back-link {
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: color 0.2s;
}

.accounting-header .back-link:hover {
  color: var(--primary);
}

/* 统计卡片网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border-color);
}

.stat-card.total {
  grid-column: span 2;
  background: linear-gradient(135deg, rgba(155,126,189,0.15), rgba(0,217,255,0.1));
  border-color: rgba(155,126,189,0.3);
}

.stat-card .stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.stat-card .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-card.total .stat-value {
  font-size: 2rem;
}

.stat-card .stat-change {
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 12px;
  margin-top: 6px;
  display: inline-block;
}

.stat-card .stat-change.up {
  background: rgba(248,113,113,0.2);
  color: #f87171;
}

.stat-card .stat-change.down {
  background: rgba(74,222,128,0.2);
  color: #4ade80;
}

.stat-card .stat-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 6px;
}

/* 时间筛选器 */
.time-filter {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  padding: 4px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
}

.filter-tab {
  padding: 8px 14px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}

.filter-tab:hover {
  color: var(--text-primary);
}

.filter-tab.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
}

.time-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  padding: 8px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
}

.time-nav button {
  background: none;
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px 8px;
  transition: color 0.2s;
}

.time-nav button:hover {
  color: var(--primary);
}

.time-nav span {
  font-size: 0.9rem;
  min-width: 80px;
  text-align: center;
}

/* 图表区域 */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border-color);
}

.chart-card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-primary);
}

.chart-container {
  height: 200px;
}

/* 消费明细 */
.records-list {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--border-color);
}

.records-list h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
}

.records-scroll {
  max-height: 300px;
  overflow-y: auto;
}

.record-item {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-color);
  transition: background 0.2s;
}

.record-item:last-child {
  border: none;
}

.record-item:hover {
  background: rgba(255,255,255,0.02);
}

.record-icon {
  font-size: 1.3rem;
  margin-right: 12px;
}

.record-info {
  flex: 1;
}

.record-category {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-primary);
}

.record-note {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.record-date {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-right: 12px;
}

.record-amount {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary);
}

/* 响应式 */
@media (max-width: 600px) {
  .charts-grid {
    grid-template-columns: 1fr;
  }
  
  .stats-grid {
    gap: 10px;
  }
  
  .stat-card .stat-value {
    font-size: 1.3rem;
  }
  
  .stat-card.total .stat-value {
    font-size: 1.6rem;
  }
}

/* 滚动条美化 */
.records-scroll::-webkit-scrollbar {
  width: 6px;
}

.records-scroll::-webkit-scrollbar-track {
  background: rgba(155,126,189,0.1);
  border-radius: 3px;
}

.records-scroll::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 3px;
}

    #frieren-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    #frieren-scroll-progress { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, #9B7EBD, #00d9ff); z-index: 9999; transition: width 0.1s ease; }
    .frieren-container { position: relative; z-index: 1; }
  </style>
</head>

  </footer></div><div id="frieren-scroll-progress" style="position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,#9B7EBD,#00d9ff);z-index:9999;transition:width 0.1s ease;"></div><canvas id="frieren-particles" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas><script>
(function() {
  // ========== 滚动进度条 ==========
  const progressBar = document.getElementById('frieren-scroll-progress');
  if (progressBar) {
    window.addEventListener('scroll', function() {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      progressBar.style.width = scrolled + '%';
    });
  }
  
  // ========== 粒子效果 ==========
  var canvas = document.getElementById('frieren-particles');
  if (!canvas) return;
  
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animationId;
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  
  function createParticles() {
    particles = [];
    for (var i = 0; i < 30; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        radius: Math.random() * 2 + 1,
        opacity: Math.random() * 0.4 + 0.2
      });
    }
  }
  
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(function(p, i) {
      p.x += p.vx;
      p.y += p.vy;
      
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(155, 126, 189, ' + p.opacity + ')';
      ctx.fill();
      
      // 连线
      particles.slice(i + 1).forEach(function(p2) {
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 100) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(155, 126, 189, ' + (1 - distance / 100) * 0.15 + ')';
          ctx.lineWidth = 1;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      });
    });
    
    animationId = requestAnimationFrame(drawParticles);
  }
  
  // 初始化
  resize();
  createParticles();
  drawParticles();
  
  window.addEventListener('resize', function() {
    resize();
    createParticles();
  });
  
  // 减少动画
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {

  var weekNum = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);

}

}

function ppk() {
  if (P === "year") return (C.getFullYear() - 1).toString();

}
