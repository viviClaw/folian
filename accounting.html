<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>芙莉莲记账</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit','Noto Sans SC',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;padding:20px}
.x{max-width:800px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.back{color:#888;font-size:0.9rem;text-decoration:none}
h1{font-size:1.5rem;background:linear-gradient(135deg,#9B7EBD,#7c5ce0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.g{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.c{background:#1a1a24;border-radius:14px;padding:14px}
.c.tot{grid-column:span 2;background:linear-gradient(135deg,rgba(155,126,189,0.2),rgba(168,230,207,0.2))}
.l{font-size:0.7rem;color:#888;margin-bottom:6px}
.v{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#9B7EBD,#7c5ce0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.c.tot .v{font-size:1.8rem}
.ch{font-size:0.7rem;padding:2px 6px;border-radius:10px;margin-top:4px;display:inline-block}
.ch.up{background:rgba(248,113,113,0.2);color:#f87171}
.ch.down{background:rgba(74,222,128,0.2);color:#4ade80}
.m{font-size:0.65rem;color:#666;margin-top:4px}
.y{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.s{display:flex;gap:4px;background:#1a1a24;padding:4px;border-radius:10px}
.bt{padding:8px 14px;border:none;background:0 0;color:#888;font-size:0.85rem;cursor:pointer;border-radius:8px}
.bt.active{background:linear-gradient(135deg,#9B7EBD,#7c5ce0);color:#fff}
.t{display:flex;align-items:center;gap:10px;background:#1a1a24;padding:6px 10px;border-radius:8px}
.t button{background:0;border:none;color:#fff;cursor:pointer;font-size:1rem}
.t span{font-size:0.9rem;min-width:80px;text-align:center}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.cc{background:#1a1a24;border-radius:14px;padding:14px}
.cc h3{font-size:1rem;font-weight:600;margin-bottom:10px}
.list{background:#1a1a24;border-radius:14px;padding:14px}
.list h3{font-size:1rem;font-weight:600;margin-bottom:10px}
.rl{max-height:300px;overflow-y:auto}
.ri{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #22222e}
.ri:last-child{border:0}
.ri2{font-size:1.2rem;margin-right:10px}
.ri3{flex:1}
.ri4{font-size:0.85rem;font-weight:500}
.ri5{font-size:0.7rem;color:#666}
.ri6{font-size:0.7rem;color:#666;margin-right:10px}
.ri7{font-size:0.9rem;font-weight:600;color:#9B7EBD}
@media(max-width:600px){.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="x">
<header><a href="index.html" class="back">← 返回首页</a><h1>💰 芙莉莲记账</h1></header>
<div class="g">
<div class="c tot"><div class="l">💰 总支出</div><div class="v" id="ta">¥0</div><div class="ch" id="tc">-</div><div class="m" id="rc">共 0 笔</div></div>
<div class="c"><div class="l">📊 周均</div><div class="v" id="av">¥0</div></div>
<div class="c"><div class="l">🏆 最高</div><div class="v" id="ma">¥0</div></div>
<div class="c"><div class="l">📁 类别</div><div class="v" id="cc">0</div></div>
</div>
<div class="y">
<div class="s">
<button class="bt" data-p="day">日</button>
<button class="bt" data-p="week">周</button>
<button class="bt" data-p="month">月</button>
<button class="bt" data-p="year">年</button>
</div>
<div class="t">
<button id="prev">◀</button>
<span id="disp">第10周</span>
<button id="next">▶</button>
</div>
</div>
<div class="charts">
<div class="cc"><h3>📈 支出趋势</h3><div id="trend-chart" style="height:200px"></div></div>
<div class="cc"><h3>🥧 分类占比</h3><div id="pie-chart" style="height:200px"></div></div>
</div>
<div class="list"><h3>📝 消费明细</h3><div class="rl" id="rl"></div></div>
</div>
<script>
var D = {"records":[{"id":"1","date":"2026-01-05","amount":128,"category":"购物","note":"网购衣服"},{"id":"2","date":"2026-01-12","amount":2800,"category":"住房","note":"房租"},{"id":"3","date":"2026-01-20","amount":88,"category":"购物","note":"日用品"},{"id":"4","date":"2026-01-25","amount":450,"category":"交通","note":"回家机票"},{"id":"5","date":"2026-02-05","amount":299,"category":"购物","note":"鞋子"},{"id":"6","date":"2026-02-14","amount":1314,"category":"购物","note":"情人节礼物"},{"id":"7","date":"2026-02-20","amount":168,"category":"医疗","note":"体检"},{"id":"8","date":"2026-02-25","amount":3200,"category":"住房","note":"房租+水电"},{"id":"9","date":"2026-03-05","amount":18,"category":"交通","note":"打车"},{"id":"10","date":"2026-03-05","amount":50,"category":"餐饮","note":"吃饭"},{"id":"11","date":"2026-03-05","amount":25,"category":"餐饮","note":"晚饭"},{"id":"1772764527472","date":"2026-03-06","amount":16.3,"category":"交通","note":"早上打车"},{"id":"1772766030707","date":"2026-03-06","amount":16.3,"category":"交通","note":"早上打车"},{"id":"1772814021738","date":"2026-03-06","amount":41,"category":"餐饮","note":"麦当劳"},{"id":"1772870520000","date":"2026-03-07","amount":105,"category":"餐饮","note":"叮咚买菜"}],"categories":[{"name":"餐饮","icon":"🍽️","color":"#FF6B6B"},{"name":"交通","icon":"🚇","color":"#4ECDC4"},{"name":"购物","icon":"🛍️","color":"#FFE66D"},{"name":"住房","icon":"🏠","color":"#95E1D3"},{"name":"娱乐","icon":"🎬","color":"#DDA0DD"},{"name":"医疗","icon":"💊","color":"#98D8C8"},{"name":"教育","icon":"📚","color":"#F7DC6F"},{"name":"收入","icon":"💰","color":"#77DD77"},{"name":"其他","icon":"📦","color":"#B0BEC5"}],"stats":{"day":{"2026-01-05":{"t":128,"c":{"购物":128}},"2026-01-12":{"t":2800,"c":{"住房":2800}},"2026-01-20":{"t":88,"c":{"购物":88}},"2026-01-25":{"t":450,"c":{"交通":450}},"2026-02-05":{"t":299,"c":{"购物":299}},"2026-02-14":{"t":1314,"c":{"购物":1314}},"2026-02-20":{"t":168,"c":{"医疗":168}},"2026-02-25":{"t":3200,"c":{"住房":3200}},"2026-03-05":{"t":93,"c":{"交通":18,"餐饮":75}},"2026-03-06":{"t":73.6,"c":{"交通":32.6,"餐饮":41}},"2026-03-07":{"t":105,"c":{"餐饮":105}}},"week":{"2026-W02":{"t":128,"c":{"购物":128}},"2026-W03":{"t":2800,"c":{"住房":2800}},"2026-W04":{"t":88,"c":{"购物":88}},"2026-W05":{"t":450,"c":{"交通":450}},"2026-W06":{"t":299,"c":{"购物":299}},"2026-W07":{"t":1314,"c":{"购物":1314}},"2026-W08":{"t":168,"c":{"医疗":168}},"2026-W09":{"t":3200,"c":{"住房":3200}},"2026-W10":{"t":271.6,"c":{"交通":50.599999999999994,"餐饮":221}}},"month":{"2026-01":{"t":3466,"c":{"购物":216,"住房":2800,"交通":450}},"2026-02":{"t":4981,"c":{"购物":1613,"医疗":168,"住房":3200}},"2026-03":{"t":271.6,"c":{"交通":50.599999999999994,"餐饮":221}}},"year":{"2026":{"t":8718.599999999999,"c":{"购物":1829,"住房":6000,"交通":500.6,"医疗":168,"餐饮":221}}}}};
var P = "week", C = new Date(2026, 2, 7);
var tc, pc;

function getWeekKey(d) {
  var y = d.getFullYear();
  var firstDay = new Date(y, 0, 1);
  var pastDays = Math.floor((d - firstDay) / 86400000);
  var weekNum = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
  return y + "-W" + weekNum.toString().padStart(2, "0");
}

function pk() {
  if (P === "year") return C.getFullYear().toString();
  if (P === "month") return C.getFullYear() + "-" + (C.getMonth() + 1).toString().padStart(2, "0");
  return getWeekKey(C);
}

function ppk() {
  if (P === "year") return (C.getFullYear() - 1).toString();
  if (P === "month") { var p = new Date(C.getFullYear(), C.getMonth() - 1, 1); return p.getFullYear() + "-" + (p.getMonth() + 1).toString().padStart(2, "0"); }
  var pw = new Date(C); pw.setDate(C.getDate() - 7); return getWeekKey(pw);
}

function fd() {
  if (P === "year") return C.getFullYear() + "年";
  if (P === "month") return C.getFullYear() + "-" + (C.getMonth() + 1).toString().padStart(2, "0");
  return "第" + pk().slice(-2) + "周";
}

function gd(k) { return D.stats[P] && D.stats[P][k] || {t:0, c:{}}; }

function init() {
  tc = echarts.init(document.getElementById("trend-chart"));
  pc = echarts.init(document.getElementById("pie-chart"));
  
  document.querySelectorAll(".bt").forEach(function(b) {
    if (b.getAttribute("data-p") === P) b.classList.add("active");
  });
  
  document.querySelectorAll(".bt").forEach(function(b) {
    b.onclick = function() {
      document.querySelectorAll(".bt").forEach(function(x) { x.classList.remove("active"); });
      this.classList.add("active");
      P = this.getAttribute("data-p");
      C = new Date(2026, 2, 7);
      U();
    };
  });
  
  document.getElementById("prev").onclick = function() {
    if (P === "year") C.setFullYear(C.getFullYear() - 1);
    else if (P === "month") C.setMonth(C.getMonth() - 1);
    else C.setDate(C.getDate() - 7);
    U();
  };
  
  document.getElementById("next").onclick = function() {
    if (P === "year") C.setFullYear(C.getFullYear() + 1);
    else if (P === "month") C.setMonth(C.getMonth() + 1);
    else C.setDate(C.getDate() + 7);
    U();
  };
}

function U() {
  var k = pk(), pk2 = ppk();
  document.getElementById("disp").textContent = fd();
  var d = gd(k), pd = gd(pk2), t = d.t || 0, pt = pd.t || 0;
  var c = pt > 0 ? ((t - pt) / pt * 100) : 0;
  
  document.getElementById("ta").textContent = "¥" + t.toLocaleString();
  var ce = document.getElementById("tc");
  if (P === "year") { ce.textContent = (c >= 0 ? "↑" : "↓") + " " + Math.abs(c).toFixed(1) + "%"; ce.className = "ch " + (c >= 0 ? "up" : "down"); }
  else if (P === "month") { ce.textContent = (c >= 0 ? "↑" : "↓") + " " + Math.abs(c).toFixed(1) + "%"; ce.className = "ch " + (c >= 0 ? "up" : "down"); }
  else { ce.textContent = "-"; ce.className = "ch"; }
  
  document.getElementById("rc").textContent = "共 " + Object.keys(d.c || {}).length + " 笔";
  document.getElementById("av").textContent = "¥" + Math.round(t / 7).toLocaleString();
  
  var rs = D.records.filter(function(r) {
    var rd = new Date(r.date);
    if (P === "year") return rd.getFullYear() === C.getFullYear();
    if (P === "month") return rd.getFullYear() === C.getFullYear() && rd.getMonth() === C.getMonth();
    return getWeekKey(rd) === k;
  });
  
  var ma = 0; rs.forEach(function(r) { if (r.amount > ma) ma = r.amount; });
  document.getElementById("ma").textContent = "¥" + ma.toLocaleString();
  document.getElementById("cc").textContent = Object.keys(d.c || {}).length;
  
  var la = [], va = [];
  if (P === "month") { Object.keys(D.stats.day).sort().forEach(function(dk) { if (dk.startsWith(k)) { la.push(dk.slice(5)); va.push(D.stats.day[dk].t); } }); }
  else if (P === "year") { var ms = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"]; ms.forEach(function(m, i) { var mk = k + "-" + (i+1).toString().padStart(2,"0"); la.push(m); va.push(D.stats.month[mk] ? D.stats.month[mk].t : 0); }); }
  else { var ds = ["周一","周二","周三","周四","周五","周六","周日"]; ds.forEach(function(di, i) { var ws = new Date(C); ws.setDate(C.getDate() - C.getDay() + 1); var dk = new Date(ws.getTime() + i*86400000).toISOString().split("T")[0]; la.push(di); va.push(D.stats.day[dk] ? D.stats.day[dk].t : 0); }); }
  
  tc.setOption({
    backgroundColor: "transparent",
    grid: {top:20,right:20,bottom:20,left:50},
    xAxis: {type:"category",data:la,axisLine:{lineStyle:{color:"#3a3a4a"}},axisLabel:{color:"#888"}},
    yAxis: {type:"value",axisLine:{lineStyle:{color:"#3a3a4a"}},axisLabel:{color:"#888"},splitLine:{lineStyle:{color:"#2a2a3a"}}},
    series: [{data:va,type:"line",smooth:true,areaStyle:{color:"rgba(155,126,189,0.2)"},lineStyle:{color:"#9B7EBD"},itemStyle:{color:"#9B7EBD"}}]
  });
  
  var cat = d.c || {};
  var sc = Object.keys(cat).map(function(name) { return {name:name,value:cat[name]}; }).sort(function(a,b){return b.value-a.value});
  var pieData = sc.map(function(x) {
    var c = D.categories.find(function(cat) { return cat.name === x.name; });
    return {name:x.name,value:x.value,itemStyle:{color:c ? c.color : "#9B7EBD"}};
  });
  
  pc.setOption({
    backgroundColor: "transparent",
    tooltip: {trigger:"item",formatter:"{b}: ¥{c} ({d}%)"},
    series: [{type:"pie",radius:["40%","70%"],data:pieData,label:{color:"#fff"}}]
  });
  
  rs.sort(function(a,b){return new Date(b.date) - new Date(a.date)});
  var html = "";
  rs.forEach(function(r) {
    var c = D.categories.find(function(cat) { return cat.name === r.category; }) || {};
    html += '<div class="ri"><span class="ri2">' + (c.icon || "📦") + '</span><div class="ri3"><div class="ri4">' + r.category + '</div><div class="ri5">' + (r.note || "-") + '</div></div><div class="ri6">' + r.date + '</div><div class="ri7">¥' + r.amount.toLocaleString() + '</div></div>';
  });
  document.getElementById("rl").innerHTML = html;
}

init(); U();
</script>
</body>
</html>
