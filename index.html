<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frieren</title>
  <style>
    :root{--primary:#9B7EBD;--bg-dark:#0a0a0f;--text-secondary:#aaa}
    body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg-dark);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
    .container{text-align:center}
    h1{font-size:2rem;background:linear-gradient(135deg,var(--primary),#e056fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem}
    .links{display:flex;flex-direction:column;gap:1rem}
    a{padding:1rem 2rem;background:rgba(155,126,189,0.1);border:1px solid rgba(155,126,189,0.3);border-radius:12px;color:var(--text-secondary);text-decoration:none;transition:all .3s}
    a:hover{background:rgba(155,126,189,0.2);color:#fff;transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="container">
    <h1>🍙 Frieren</h1>
    <div class="links">
      <a href="./dinner-picker.html">🎲 今晚吃啥</a>
    </div>
  </div>
</body>
</html>
