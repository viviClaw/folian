<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frieren - Frieren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>/**
 * Frieren 共享全局样式系统
 * 所有子项目统一引用此样式，实现一体化视觉效果
 */

/* ========== CSS 变量 ========== */
:root {
  /* 主题色 */
  --primary: #9B7EBD;
  --primary-light: #B794F6;
  --primary-dark: #7c5ce0;
  --accent: #e056fd;
  --accent-cyan: #00d9ff;
  
  /* 背景 */
  --bg-dark: #0a0a0f;
  --bg-card: #1a1a24;
  --bg-card-hover: #2a2a3a;
  --bg-gradient: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg-dark) 70%);
  
  /* 文字 */
  --text-primary: #fff;
  --text-secondary: #aaa;
  --text-muted: #666;
  
  /* 边框 */
  --border-color: #2a2a3a;
  --border-glow: rgba(155, 126, 189, 0.3);
  
  /* 阴影 */
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 40px rgba(155, 126, 189, 0.15);
  
  /* 圆角 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  
  /* 字体 */
  --font-family: 'Outfit', -apple-system, 'Noto Sans SC', sans-serif;
}

/* ========== 全局重置 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-family);
  background: var(--bg-dark);
  background-image: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover {
  color: var(--primary-light);
}

/* ========== 布局容器 ========== */
.frieren-container {
  /* max-width: 800px; */
  margin: 0 auto;
  padding: 40px;
}

/* ========== 导航栏 ========== */
.frieren-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  /* background: var(--bg-card); */
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
  /* border: 1px solid var(--border-color); */
}

.frieren-nav .brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.frieren-nav .brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(155, 126, 189, 0.3);
}

.frieren-nav .brand-name {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-nav .nav-links {
  display: flex;
  gap: 8px;
}

.frieren-nav .nav-link {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

.frieren-nav .nav-link:hover,
.frieren-nav .nav-link.active {
  background: rgba(155, 126, 189, 0.15);
  color: var(--primary);
}

/* ========== 面包屑 ========== */
.frieren-breadcrumb {
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 12px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  border: 1px solid var(--border-color);
}

.frieren-breadcrumb a {
  color: var(--primary);
}

.frieren-breadcrumb a:hover {
  color: var(--accent);
}

.frieren-breadcrumb .current {
  color: var(--text-primary);
}

/* ========== 页面标题 ========== */
.frieren-header {
  text-align: center;
  margin-bottom: 30px;
}

.frieren-header h1 {
  font-size: 2.2rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.frieren-header .subtitle {
  color: var(--text-muted);
  font-size: 1rem;
}

/* ========== 卡片 ========== */
.frieren-card {
  background: linear-gradient(145deg, #1e1e2a, #16161f);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-color);
  transition: all 0.3s ease;
}

.frieren-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-glow);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

/* ========== 按钮 ========== */
.frieren-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
  text-decoration: none;
}

.frieren-btn-primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(155, 126, 189, 0.3);
}

.frieren-btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(155, 126, 189, 0.4);
}

.frieren-btn-secondary {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.frieren-btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* ========== 标签 ========== */
.frieren-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  background: rgba(155, 126, 189, 0.2);
  color: var(--primary);
  border: 1px solid rgba(155, 126, 189, 0.3);
}

.frieren-tag-new {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
}

/* ========== 统计卡片 ========== */
.frieren-stat {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-stat:hover {
  background: var(--bg-card-hover);
}

.frieren-stat .value {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-stat .label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ========== 列表 ========== */
.frieren-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.frieren-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-list-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
}

/* ========== 表格 ========== */
.frieren-table {
  width: 100%;
  border-collapse: collapse;
}

.frieren-table th,
.frieren-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.frieren-table th {
  background: linear-gradient(90deg, rgba(155, 126, 189, 0.1), transparent);
  color: var(--primary);
  font-weight: 600;
}

.frieren-table tr:hover td {
  background: rgba(255, 255, 255, 0.02);
}

/* ========== 底部 ========== */
.frieren-footer {
  text-align: center;
  padding: 30px;
  margin-top: 40px;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--border-color);
}

.frieren-footer .made-with {
  margin-top: 8px;
  font-size: 0.8rem;
}

/* ========== 工具类 ========== */
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-2 { gap: 8px; }
.gap-4 { gap: 16px; }
.grid { display: grid; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .frieren-nav {
    flex-direction: column;
    gap: 12px;
  }
  
  .frieren-nav .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .frieren-header h1 {
    font-size: 1.8rem;
  }
  
  .grid-4 {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  .frieren-container {
    padding: 8px;
  }
  
  .grid-2,
  .grid-4 {
    grid-template-columns: 1fr;
  }
}

/* ========== 减少动画 (可访问性) ========== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* ========== 简约优雅首页样式（含粒子动画） ========== */

/* 粒子背景容器 */
#particles-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* 温暖渐变背景 */
body {
  background: linear-gradient(135deg, 
    #1a1a2e 0%, 
    #16213e 50%, 
    #1e1e2e 100%
  ) !important;
}

.home-container {
  position: relative;
  z-index: 10;
  max-width: 1200px;
  margin: 0 auto;
  padding: 50px 30px;
}

/* ========== 简约欢迎区 ========== */
.welcome-section {
  text-align: center;
  padding: 60px 30px 50px;
  margin-bottom: 50px;
  position: relative;
}

/* 温和的光晕装饰 */
.welcome-section::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, 
    rgba(139, 92, 246, 0.08) 0%, 
    rgba(236, 72, 153, 0.05) 30%, 
    transparent 70%
  );
  filter: blur(40px);
  pointer-events: none;
}

/* 头像 */
.welcome-avatar {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 30px;
}

.avatar-glow {
  position: absolute;
  top: -10px;
  left: -10px;
  right: -10px;
  bottom: -10px;
  background: radial-gradient(circle, 
    rgba(139, 92, 246, 0.3), 
    rgba(236, 72, 153, 0.2)
  );
  border-radius: 50%;
  filter: blur(15px);
  animation: gentleGlow 4s ease-in-out infinite;
}

@keyframes gentleGlow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}

.avatar-core {
  position: relative;
  width: 120px;
  height: 120px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  box-shadow: 
    0 10px 30px rgba(139, 92, 246, 0.3),
    inset 0 0 20px rgba(255, 255, 255, 0.1);
}

/* 标题 */
.welcome-title {
  font-size: 3rem;
  font-weight: 700;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
}

.welcome-subtitle {
  font-size: 1.2rem;
  color: #a78bfa;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.welcome-subtitle::before,
.welcome-subtitle::after {
  content: '✦';
  margin: 0 12px;
  opacity: 0.6;
}

.welcome-desc {
  font-size: 1rem;
  color: #94a3b8;
  line-height: 1.8;
  max-width: 600px;
  margin: 0 auto;
}

/* ========== 统计面板 - 简约风格 ========== */
.stats-section {
  margin-bottom: 50px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding: 16px 20px;
  background: linear-gradient(135deg, 
    rgba(139, 92, 246, 0.08), 
    rgba(236, 72, 153, 0.05)
  );
  border-radius: 16px;
  border-left: 3px solid #8b5cf6;
}

.section-icon {
  font-size: 1.5rem;
}

.section-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: #fff;
  margin: 0;
  flex: 1;
}

.section-badge {
  padding: 4px 12px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff;
  border-radius: 12px;
  font-size: 0.85rem;
  font-weight: 600;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.stat-card {
  position: relative;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 28px 24px;
  border: 1px solid rgba(139, 92, 246, 0.15);
  text-align: center;
  transition: all 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-4px);
  border-color: rgba(139, 92, 246, 0.3);
  box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
}

.stat-icon {
  font-size: 2.2rem;
  margin-bottom: 14px;
  display: block;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
}

.stat-label {
  font-size: 0.9rem;
  color: #a78bfa;
  letter-spacing: 1px;
}

/* ========== 功能卡片 - 温馨风格 ========== */
.features-section {
  margin-bottom: 50px;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.feature-card {
  position: relative;
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 28px;
  text-decoration: none;
  color: inherit;
  border: 1px solid rgba(255, 255, 255, 0.08);
  transition: all 0.3s ease;
  display: block;
  overflow: hidden;
}

/* 左侧彩色边条 */
.feature-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--card-color, #8b5cf6);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.feature-card:hover::before {
  opacity: 1;
}

.feature-card:hover {
  transform: translateY(-6px);
  border-color: rgba(139, 92, 246, 0.2);
  background: rgba(255, 255, 255, 0.04);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
}

.feature-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.feature-tag {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 12px;
  background: rgba(139, 92, 246, 0.15);
  color: #a78bfa;
  letter-spacing: 1px;
}

.feature-tag.new {
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff;
}

.feature-icon {
  font-size: 2.5rem;
  transition: transform 0.3s ease;
}

.feature-card:hover .feature-icon {
  transform: scale(1.1);
}

.feature-title {
  font-size: 1.3rem;
  margin-bottom: 10px;
  color: #fff;
  font-weight: 600;
}

.feature-desc {
  font-size: 0.9rem;
  color: #94a3b8;
  line-height: 1.6;
  margin-bottom: 20px;
}

.feature-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.feature-action {
  font-size: 0.85rem;
  color: #a78bfa;
  font-weight: 500;
}

.feature-arrow {
  font-size: 1.2rem;
  color: #a78bfa;
  transition: transform 0.3s ease;
}

.feature-card:hover .feature-arrow {
  transform: translateX(6px);
}

/* ========== 快捷操作 ========== */
.actions-section {
  margin-bottom: 50px;
}

.actions-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 24px;
  border-radius: 16px;
  text-decoration: none;
  transition: all 0.3s ease;
  font-weight: 500;
}

.action-btn-primary {
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff;
  border: none;
  box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
}

.action-btn-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
}

.action-btn-secondary {
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #e0e7ff;
  border: 1px solid rgba(139, 92, 246, 0.2);
}

.action-btn-secondary:hover {
  transform: translateY(-4px);
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(139, 92, 246, 0.3);
}

.action-icon {
  font-size: 1.8rem;
}

.action-text {
  font-size: 0.95rem;
  flex: 1;
}

/* ========== 响应式设计 ========== */
@media (max-width: 1024px) {
  .features-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .actions-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 768px) {
  .home-container {
    padding: 40px 20px;
  }
  
  .welcome-section {
    padding: 40px 20px 40px;
  }
  
  .welcome-avatar {
    width: 100px;
    height: 100px;
    margin-bottom: 24px;
  }
  
  .avatar-core {
    width: 100px;
    height: 100px;
    font-size: 50px;
  }
  
  .welcome-title {
    font-size: 2.2rem;
  }
  
  .welcome-subtitle {
    font-size: 1rem;
  }
  
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  
  .stat-card {
    padding: 20px;
  }
  
  .stat-number {
    font-size: 2rem;
  }
  
  .features-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  
  .feature-card {
    padding: 24px;
  }
  
  .feature-title {
    font-size: 1.2rem;
  }
  
  .actions-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .section-header {
    padding: 14px 16px;
  }
  
  .section-title {
    font-size: 1.1rem;
  }
}

@media (max-width: 480px) {
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .welcome-title {
    font-size: 1.8rem;
  }
}

    #frieren-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    #frieren-scroll-progress { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, #9B7EBD, #00d9ff); z-index: 9999; transition: width 0.1s ease; }
    .frieren-container { position: relative; z-index: 1; }
  </style>
</head>
<body><div class="frieren-container">
<div class="home-container">
  <!-- 欢迎区域 -->
  <section class="welcome-section">
    <div class="welcome-avatar">
      <div class="avatar-glow"></div>
      <div class="avatar-core">📝</div>
    </div>
    
    <h1 class="welcome-title">Frieren</h1>

<!-- 粒子背景 -->
<div id="particles-container"></div>

<script>
  // 粒子效果 - 柔和版本
  (function() {
    const container = document.getElementById('particles-container');
    if (!container) return;
    
    // 粒子数量适中
    const particleCount = 35;
    
    // 创建样式
    const style = document.createElement('style');
    style.textContent = `
      @keyframes particleFloat {
        0% {
          transform: translateY(100vh) translateX(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-10vh) translateX(${Math.random() * 100 - 50}px) rotate(360deg);
          opacity: 0;
        }
      }
      
      @keyframes particleTwinkle {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.3);
        }
      }
    `;
    document.head.appendChild(style);
    
    // 创建粒子
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      const size = Math.random() * 3 + 1.5;
      const isRound = Math.random() > 0.3;
      
      // 随机颜色（柔和的紫色和粉色系）
      const colors = [
        'rgba(139, 92, 246, 0.6)',  // 紫色
        'rgba(236, 72, 153, 0.5)',  // 粉色
        'rgba(96, 165, 250, 0.4)',  // 蓝色
        'rgba(167, 139, 250, 0.5)', // 浅紫
        'rgba(244, 114, 182, 0.4)'  // 浅粉
      ];
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      particle.style.cssText = `
        position: absolute;
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        border-radius: ${isRound ? '50%' : '2px'};
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        opacity: 0;
        animation: 
          particleFloat ${Math.random() * 15 + 20}s linear infinite,
          particleTwinkle ${Math.random() * 3 + 2}s ease-in-out infinite;
        animation-delay: ${Math.random() * 20}s, ${Math.random() * 3}s;
        pointer-events: none;
        box-shadow: 0 0 ${size * 2}px ${color};
      `;
      
      container.appendChild(particle);
    }
  })();
  
  // 数字增长动画
  function animateNumbers() {
    const numbers = document.querySelectorAll('.stat-number[data-count]');
    numbers.forEach(num => {
      const target = parseInt(num.getAttribute('data-count'));
      const duration = 2000;
      const startTime = performance.now();
      const label = num.nextElementSibling?.textContent || '';
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(target * easeOut);
        
        if (label.includes('满意度')) {
          num.textContent = current + '%';
        } else {
          num.textContent = current.toLocaleString();
        }
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      
      requestAnimationFrame(update);
    });
  }
  
  // 滚动触发动画
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animateNumbers();
        observer.disconnect();
      }
    });
  }, { threshold: 0.5 });
  
  const statsSection = document.querySelector('.stats-section');
  if (statsSection) observer.observe(statsSection);
</script>

  </footer></div><div id="frieren-scroll-progress" style="position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,#9B7EBD,#00d9ff);z-index:9999;transition:width 0.1s ease;"></div><canvas id="frieren-particles" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas><script>
(function() {
  // ========== 滚动进度条 ==========
  const progressBar = document.getElementById('frieren-scroll-progress');
  if (progressBar) {
    window.addEventListener('scroll', function() {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      progressBar.style.width = scrolled + '%';
    });
  }
  
  // ========== 粒子效果 ==========
  var canvas = document.getElementById('frieren-particles');
  if (!canvas) return;
  
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animationId;
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  
  function createParticles() {
    particles = [];
    for (var i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        radius: Math.random() * 2 + 1,
        opacity: Math.random() * 0.4 + 0.2
      });
    }
  }
  
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(function(p, i) {
      p.x += p.vx;
      p.y += p.vy;
      
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(155, 126, 189, ' + p.opacity + ')';
      ctx.fill();
      
      // 连线
      particles.slice(i + 1).forEach(function(p2) {
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 120) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(155, 126, 189, ' + (1 - distance / 120) * 0.15 + ')';
          ctx.lineWidth = 1;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      });
    });
    
    animationId = requestAnimationFrame(drawParticles);
  }
  
  // 初始化
  resize();
  createParticles();
  drawParticles();
  
  window.addEventListener('resize', function() {
    resize();
    createParticles();
  });
  
  // 减少动画
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {
    if (animationId) cancelAnimationFrame(animationId);
  }
})();
</script></body>
