<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>:root{--primary:#9B7EBD;--primary-light:#B794F6;--primary-dark:#7c5ce0;--accent:#e056fd;--accent-cyan:#00d9ff;--bg-dark:#0a0a0f;--bg-card:#1a1a24;--bg-card-hover:#2a2a3a;--bg-gradient:radial-gradient(ellipse at top,#1a1a2e 0%,var(--bg-dark) 70%);--text-primary:#fff;--text-secondary:#aaa;--text-muted:#666;--border-color:#2a2a3a;--border-glow:rgba(155,126,189,0.3);--shadow-card:0 8px 32px rgba(0,0,0,0.3);--shadow-glow:0 0 40px rgba(155,126,189,0.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--font-family:'Outfit',-apple-system,'Noto Sans SC',sans-serif}*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-family);background:var(--bg-dark);background-image:var(--bg-gradient);color:var(--text-primary);min-height:100vh;line-height:1.6}a{color:var(--accent);text-decoration:none;transition:color .2s ease}a:hover{color:var(--primary-light)}.frieren-container{max-width:800px;margin:0 auto;padding:40px}.frieren-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-radius:var(--radius-lg);margin-bottom:24px}.frieren-nav .brand{display:flex;align-items:center;gap:10px}.frieren-nav .brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary) 0%,var(--accent-cyan) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(155,126,189,0.3)}.frieren-nav .brand-name{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.frieren-nav .nav-links{display:flex;gap:8px}.frieren-nav .nav-link{padding:8px 14px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:0.9rem;transition:all .2s ease}.frieren-nav .nav-link:hover,.frieren-nav .nav-link.active{background:rgba(155,126,189,0.15);color:var(--primary)}:root{--module-accent:#9B7EBD;--module-accent-rgb:155,126,189;--module-accent-2:#e056fd;--module-accent-2-rgb:224,86,253}.dinner-picker{max-width:800px;margin:0 auto}.picker-header{text-align:center;margin-bottom:32px;padding:28px;background:linear-gradient(135deg,rgba(var(--module-accent-rgb),.12),rgba(var(--module-accent-2-rgb),.08));border-radius:20px;border:1px solid rgba(var(--module-accent-rgb),.2);position:relative;overflow-hidden}.picker-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--module-accent),var(--module-accent-2),transparent)}.picker-header h2{font-size:1.8rem;font-weight:600;background:linear-gradient(135deg,var(--module-accent),var(--module-accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.location-info{color:var(--text-secondary);font-size:.9rem}.filter-section{margin-bottom:28px}.filter-group{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:16px;background:rgba(26,26,36,.6);border-radius:16px;border:1px solid var(--border-color)}.filter-btn{padding:10px 20px;border:1px solid rgba(var(--module-accent-rgb),.3);background:0 0;color:var(--text-secondary);border-radius:24px;cursor:pointer;transition:all .3s ease;font-size:.9rem}.filter-btn:hover{background:rgba(var(--module-accent-rgb),.1);color:var(--text-primary);border-color:var(--module-accent)}.filter-btn.active{background:linear-gradient(135deg,var(--module-accent),var(--module-accent-2));color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(var(--module-accent-rgb),.3)}.roll-section{text-align:center;margin-bottom:32px}.roll-btn{padding:18px 56px;font-size:1.2rem;background:linear-gradient(135deg,var(--module-accent),var(--module-accent-2));color:#fff;border:none;border-radius:50px;cursor:pointer;display:inline-flex;align-items:center;gap:12px;transition:all .3s ease;box-shadow:0 6px 25px rgba(155,126,189,.4);font-weight:600}.roll-btn:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(155,126,189,.5)}.roll-btn.rolling{animation:rollShake .8s ease-in-out}@keyframes rollShake{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-8deg) scale(1.05)}75%{transform:rotate(8deg) scale(1.05)}}.roll-icon{font-size:1.5rem}.result-area{margin-bottom:32px}.result-area.hidden{display:none}.result-card{background:linear-gradient(145deg,#1e1e2e,#16213e);border-radius:20px;padding:36px;text-align:center;border:1px solid rgba(var(--module-accent-rgb),.2);position:relative;overflow-hidden;animation:resultPop .5s ease-out}.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--module-accent),var(--module-accent-2),transparent)}@keyframes resultPop{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}.result-icon{font-size:3.5rem;margin-bottom:16px;animation:twinkle 2s ease-in-out infinite}@keyframes twinkle{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}.result-card h3{font-size:1.5rem;color:#fff;margin-bottom:12px;font-weight:600}.result-address{color:var(--text-secondary);margin-bottom:8px;font-size:.95rem}.result-category{display:inline-block;padding:6px 16px;background:linear-gradient(135deg,var(--module-accent),var(--module-accent-2));color:#fff;border-radius:16px;font-size:.85rem;font-weight:500}.restaurant-list{background:linear-gradient(145deg,#1e1e2e,#16213e);border-radius:20px;padding:24px;border:1px solid rgba(var(--module-accent-rgb),.15);position:relative}.restaurant-list::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(var(--module-accent-rgb),.3),rgba(var(--module-accent-2-rgb),.3))}.restaurant-list h3{font-size:1.1rem;font-weight:600;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:8px}.restaurant-list h3::before{content:'✦';color:var(--module-accent);font-size:.9em}.restaurant-list h3 span{color:var(--module-accent)}.list-items{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto}.list-item{padding:14px 18px;background:rgba(30,30,46,.5);border-radius:14px;cursor:pointer;transition:all .25s ease;border:1px solid transparent}.list-item:hover{background:rgba(var(--module-accent-rgb),.12);border-color:rgba(var(--module-accent-rgb),.2);transform:translateX(6px)}.item-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.item-name{font-weight:600;color:#e0e7ff;font-size:.95rem}.item-category{font-size:.75rem;padding:4px 10px;background:linear-gradient(135deg,var(--module-accent),var(--module-accent-2));color:#fff;border-radius:12px;font-weight:500}.item-address{font-size:.85rem;color:var(--text-secondary)}.list-items::-webkit-scrollbar{width:6px}.list-items::-webkit-scrollbar-track{background:rgba(0,0,0,.2);border-radius:3px}.list-items::-webkit-scrollbar-thumb{background:var(--module-accent);border-radius:3px}.frieren-footer{text-align:center;padding:30px;margin-top:40px;color:var(--text-muted);font-size:.85rem;border-top:1px solid var(--border-color)}.frieren-footer .made-with{margin-top:8px;font-size:.8rem}@media(max-width:600px){.filter-group{gap:8px}.filter-btn{padding:8px 14px;font-size:.85rem}.roll-btn{padding:14px 36px;font-size:1rem}}#frieren-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}#frieren-scroll-progress{position:fixed;top:0;left:0;width:0;height:3px;background:linear-gradient(90deg,#9B7EBD,#00d9ff);z-index:9999;transition:width .1s ease}.frieren-container{position:relative;z-index:1}</style>
</head>
<body><div class="frieren-container"><nav class="frieren-nav"><div class="brand"><div class="brand-icon">🍙</div><span class="brand-name">Frieren</span></div><div class="nav-links"><a href="./index.html" class="nav-link">🏠 首页</a><a href="./dinner-picker.html" class="nav-link active">🎲 今晚吃啥</a></div></nav><div class="dinner-picker"><div class="picker-header"><h2>今晚吃什么呢？</h2><p class="location-info">📍 政立路 489 号附近 800 米</p></div><div class="filter-section"><div class="filter-group"><button class="filter-btn active" data-category="all">全部</button><button class="filter-btn" data-category="快餐">快餐</button><button class="filter-btn" data-category="面馆">面馆</button><button class="filter-btn" data-category="中餐">中餐</button><button class="filter-btn" data-category="日料">日料</button><button class="filter-btn" data-category="烧烤">烧烤</button><button class="filter-btn" data-category="披萨">披萨</button></div></div><div class="roll-section"><button id="rollBtn" class="roll-btn"><span class="roll-icon">🎲</span><span class="roll-text">随机选择</span></button></div><div id="resultArea" class="result-area hidden"><div class="result-card"><div class="result-icon">🍽️</div><h3 id="restaurantName">-</h3><p id="restaurantAddress" class="result-address">-</p><p id="restaurantCategory" class="result-category">-</p></div></div><div class="restaurant-list"><h3>可选餐馆 (<span id="restaurantCount">0</span>家)</h3><div id="restaurantList" class="list-items"></div></div></div><footer class="frieren-footer"><p>魔法是关于想象的艺术</p><p class="made-with">Made with 🪄 🦞 & 🍙</p></footer></div><div id="frieren-scroll-progress"></div><canvas id="frieren-particles"></canvas><script>const restaurants=[{name:"肯德基(国正中心店)",address:"政立路487_1号1楼",category:"快餐",tel:"13661757566"},{name:"大米先生(国正中心店)",address:"政立路487-6号国正中心P4幢1楼",category:"快餐",tel:"13677335546"},{name:"杨国福麻辣烫(政立路店)",address:"政立路487号-10",category:"快餐",tel:"18221537095"},{name:"武大郎烧饼(政云路店)",address:"政云路8号",category:"快餐",tel:"13860127760"},{name:"luckincoffee瑞幸咖啡(凯德国正中心店)",address:"政立路485号凯德国正中心底商",category:"咖啡",tel:""},{name:"胡子大厨·超级小炒肉(凯德国正店)",address:"政立路489号国正中心5号楼1楼",category:"中餐",tel:"13361931772"},{name:"伍玖私宴(君庭广场店)",address:"国霞路59号君庭广场3号楼",category:"中餐",tel:"18521407979"},{name:"丰和日丽(创智天地店)",address:"政学路39号",category:"中餐",tel:"021-34665977"},{name:"马记人民公社东北菜(政恒路店)",address:"政恒路185号",category:"中餐",tel:"13636342999"},{name:"稻香情时尚智选餐厅(政恒路店)",address:"政恒路151号",category:"中餐",tel:"15974109996"},{name:"徽廷宴·徽菜(创智天地店)",address:"创智天地政学路77号",category:"中餐",tel:"13681607113"},{name:"大粤啫煲仔饭(杨浦店)",address:"政恒路168号",category:"中餐",tel:"18918539259"},{name:"潮界(大学路店)",address:"淞沪路333号2楼",category:"中餐",tel:"021-31651720"},{name:"食其家·牛丼咖喱(国正中心店)",address:"政立路489-6号楼1楼",category:"日料",tel:"18117228571"},{name:"达美乐比萨(政立路店)",address:"政立路489-11号1楼",category:"披萨",tel:"4001597597"},{name:"海大师炭烤小酒馆",address:"国安路173号",category:"烧烤",tel:"13701686924"},{name:"刘栋梁大排档(大学路店)",address:"大学路246号",category:"烧烤",tel:"021-55382117"},{name:"朱光玉火锅馆(大学路店)",address:"淞沪路303号创智天地广场3期11号楼2层",category:"火锅",tel:"021-55233818"},{name:"重庆特色面馆(国安路店)",address:"国安路119号",category:"面馆",tel:"15221820060"},{name:"屿见面(大学路店)",address:"大学路302号202室",category:"面馆",tel:"13761033445"},{name:"小刘红烧牛肉面(国定路600弄小区店)",address:"国定路600弄1-16临16号",category:"面馆",tel:"13271271093"},{name:"和府捞面(杨浦国华广场店)",address:"闸殷路1599号国华广场B1-014-A号",category:"面馆",tel:"18768325744"},{name:"河南烩面",address:"上海新村东南门北230米",category:"面馆",tel:""},{name:"米听coffee·意面·牛排(创智店)",address:"国通路133号103室",category:"西餐",tel:"18964740327"}];let currentCategory='all';function init(){renderRestaurantList();setupEventListeners()}function renderRestaurantList(){const filtered=currentCategory==='all'?restaurants:restaurants.filter(r=>r.category===currentCategory);document.getElementById('restaurantCount').textContent=filtered.length;const listEl=document.getElementById('restaurantList');listEl.innerHTML=filtered.map(r=>`<div class="list-item" data-name="${r.name}" data-address="${r.address}" data-category="${r.category}"><div class="item-info"><span class="item-name">${r.name}</span><span class="item-category">${r.category}</span></div><span class="item-address">${r.address}</span></div>`).join('');listEl.querySelectorAll('.list-item').forEach(item=>{item.addEventListener('click',()=>{showResult({name:item.dataset.name,address:item.dataset.address,category:item.dataset.category})})})}function showResult(restaurant){const resultArea=document.getElementById('resultArea');resultArea.classList.remove('hidden');document.getElementById('restaurantName').textContent=restaurant.name;document.getElementById('restaurantAddress').textContent=restaurant.address;document.getElementById('restaurantCategory').textContent=restaurant.category;resultArea.scrollIntoView({behavior:'smooth',block:'center'})}function setupEventListeners(){document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentCategory=btn.dataset.category;renderRestaurantList()})});document.getElementById('rollBtn').addEventListener('click',()=>{const filtered=currentCategory==='all'?restaurants:restaurants.filter(r=>r.category===currentCategory);if(filtered.length===0){alert('当前分类下没有餐馆~');return}const btn=document.getElementById('rollBtn');btn.classList.add('rolling');btn.querySelector('.roll-text').textContent='Rolling...';setTimeout(()=>{const randomIndex=Math.floor(Math.random()*filtered.length);const selected=filtered[randomIndex];showResult(selected);btn.classList.remove('rolling');btn.querySelector('.roll-text').textContent='随机选择'},800)})}document.addEventListener('DOMContentLoaded',init);(function(){const progressBar=document.getElementById('frieren-scroll-progress');if(progressBar){window.addEventListener('scroll',function(){const winScroll=document.body.scrollTop||document.documentElement.scrollTop;const height=document.documentElement.scrollHeight-document.documentElement.clientHeight;const scrolled=(winScroll/height)*100;progressBar.style.width=scrolled+'%'})}}());(function(){var canvas=document.getElementById('frieren-particles');if(!canvas)return;var ctx=canvas.getContext('2d');var particles=[];var animationId;function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}function createParticles(){particles=[];for(var i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,radius:Math.random()*2+1,opacity:Math.random()*.4+.2})}}function drawParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(function(p,i){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fillStyle='rgba(155, 126, 189, '+p.opacity+')';ctx.fill();particles.slice(i+1).forEach(function(p2){var dx=p.x-p2.x;var dy=p.y-p2.y;var distance=Math.sqrt(dx*dx+dy*dy);if(distance<120){ctx.beginPath();ctx.strokeStyle='rgba(155, 126, 189, '+(1-distance/120)*.15+')';ctx.lineWidth=1;ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}})});animationId=requestAnimationFrame(drawParticles)}resize();createParticles();drawParticles();window.addEventListener('resize',function(){resize();createParticles()});var prefersReducedMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;if(prefersReducedMotion){if(animationId)cancelAnimationFrame(animationId)}})();</script></body></html>
